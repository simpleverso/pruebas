<!DOCTYPE html>
<html>
<head>
    <title>USB Webcam Streamer with Effects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .effect-group {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .effect-group h3 {
            margin-bottom: 10px;
            color: #667eea;
        }

        .effect-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .effect-buttons button {
            background: rgba(102,126,234,0.3);
        }

        .effect-buttons button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 10px rgba(102,126,234,0.5);
        }

        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-box {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(5px);
        }

        .video-box h3 {
            margin-bottom: 10px;
            text-align: center;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        canvas {
            display: block;
        }

        .stream-info {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .stream-url {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .status.success {
            background: rgba(76,175,80,0.2);
            border-left: 3px solid #4caf50;
        }

        .status.error {
            background: rgba(244,67,54,0.2);
            border-left: 3px solid #f44336;
        }

        .status.info {
            background: rgba(33,150,243,0.2);
            border-left: 3px solid #2196f3;
        }

        .slider-container {
            margin-top: 10px;
        }

        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }

        @media (max-width: 768px) {
            .video-container {
                grid-template-columns: 1fr;
            }
            
            button {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 USB Webcam Streamer Pro</h1>
        
        <div class="controls">
            <div class="button-group">
                <button id="startCameraBtn">🎥 Start Camera</button>
                <button id="createStreamBtn" disabled>🔗 Create Network Stream</button>
                <button id="stopStreamBtn" disabled>⏹️ Stop Stream</button>
            </div>

            <div class="effect-group">
                <h3>🖼️ Transformations</h3>
                <div class="effect-buttons">
                    <button id="mirrorBtn" data-effect="mirror">🪞 Mirror</button>
                    <button id="rotateLeftBtn">🔄 Rotate Left</button>
                    <button id="rotateRightBtn">🔄 Rotate Right</button>
                    <button id="resetTransformBtn">🔄 Reset Transform</button>
                </div>
            </div>

            <div class="effect-group">
                <h3>🎨 Visual Effects</h3>
                <div class="effect-buttons">
                    <button id="grayscaleBtn" data-effect="grayscale">⚫ Grayscale</button>
                    <button id="sepiaBtn" data-effect="sepia">🟫 Sepia</button>
                    <button id="invertBtn" data-effect="invert">🎨 Invert</button>
                    <button id="blurBtn" data-effect="blur">💨 Blur</button>
                    <button id="brightnessBtn" data-effect="brightness">☀️ Brightness</button>
                    <button id="contrastBtn" data-effect="contrast">🎚️ Contrast</button>
                    <button id="resetEffectsBtn">🔄 Reset Effects</button>
                </div>
                <div class="slider-container" id="brightnessSlider" style="display:none;">
                    <label>Brightness: <span id="brightnessValue">100</span>%</label>
                    <input type="range" id="brightnessRange" min="0" max="200" value="100">
                </div>
                <div class="slider-container" id="contrastSlider" style="display:none;">
                    <label>Contrast: <span id="contrastValue">100</span>%</label>
                    <input type="range" id="contrastRange" min="0" max="200" value="100">
                </div>
                <div class="slider-container" id="blurSlider" style="display:none;">
                    <label>Blur: <span id="blurValue">0</span>px</label>
                    <input type="range" id="blurRange" min="0" max="20" value="0" step="1">
                </div>
            </div>
        </div>

        <div class="video-container">
            <div class="video-box">
                <h3>Local Camera Preview</h3>
                <div class="video-wrapper">
                    <video id="localVideo" autoplay playsinline muted></video>
                </div>
            </div>
            <div class="video-box">
                <h3>Processed Stream Output</h3>
                <div class="video-wrapper">
                    <canvas id="outputCanvas"></canvas>
                </div>
            </div>
        </div>

        <div id="streamInfo" class="stream-info" style="display:none;">
            <h3>🔗 Share This URL:</h3>
            <div class="stream-url">
                <input type="text" id="viewerUrl" readonly>
                <button id="copyUrlBtn">📋 Copy URL</button>
            </div>
            <div id="connectionStatus" class="status info"></div>
        </div>
    </div>

    <script>
        // DOM Elements
        const localVideo = document.getElementById('localVideo');
        const outputCanvas = document.getElementById('outputCanvas');
        const ctx = outputCanvas.getContext('2d');
        const startCameraBtn = document.getElementById('startCameraBtn');
        const createStreamBtn = document.getElementById('createStreamBtn');
        const stopStreamBtn = document.getElementById('stopStreamBtn');
        const streamInfo = document.getElementById('streamInfo');
        const viewerUrl = document.getElementById('viewerUrl');
        const copyUrlBtn = document.getElementById('copyUrlBtn');
        const connectionStatus = document.getElementById('connectionStatus');

        // Effect buttons
        const mirrorBtn = document.getElementById('mirrorBtn');
        const rotateLeftBtn = document.getElementById('rotateLeftBtn');
        const rotateRightBtn = document.getElementById('rotateRightBtn');
        const resetTransformBtn = document.getElementById('resetTransformBtn');
        const grayscaleBtn = document.getElementById('grayscaleBtn');
        const sepiaBtn = document.getElementById('sepiaBtn');
        const invertBtn = document.getElementById('invertBtn');
        const blurBtn = document.getElementById('blurBtn');
        const brightnessBtn = document.getElementById('brightnessBtn');
        const contrastBtn = document.getElementById('contrastBtn');
        const resetEffectsBtn = document.getElementById('resetEffectsBtn');

        // Sliders
        const brightnessSlider = document.getElementById('brightnessSlider');
        const contrastSlider = document.getElementById('contrastSlider');
        const blurSlider = document.getElementById('blurSlider');
        const brightnessRange = document.getElementById('brightnessRange');
        const contrastRange = document.getElementById('contrastRange');
        const blurRange = document.getElementById('blurRange');
        const brightnessValue = document.getElementById('brightnessValue');
        const contrastValue = document.getElementById('contrastValue');
        const blurValue = document.getElementById('blurValue');

        let localStream = null;
        let peerConnection = null;
        let animationFrameId = null;
        
        // Effect states
        let effects = {
            mirror: false,
            rotation: 0, // 0, 90, 180, 270
            grayscale: false,
            sepia: false,
            invert: false,
            blur: 0,
            brightness: 100,
            contrast: 100
        };

        // Configuration for WebRTC
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Start camera capture
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    },
                    audio: false
                });

                localStream = stream;
                localVideo.srcObject = stream;
                
                // Set canvas size to match video
                localVideo.onloadedmetadata = () => {
                    outputCanvas.width = localVideo.videoWidth;
                    outputCanvas.height = localVideo.videoHeight;
                    startProcessingFrame();
                };
                
                startCameraBtn.disabled = true;
                createStreamBtn.disabled = false;
                
                connectionStatus.textContent = '✅ Camera ready. Click "Create Network Stream" to share.';
                connectionStatus.className = 'status success';
                
            } catch (error) {
                console.error('Error accessing camera:', error);
                let errorMsg = 'Failed to access camera: ';
                if (error.name === 'NotReadableError') {
                    errorMsg += 'Camera may be in use by another application.';
                } else if (error.name === 'NotAllowedError') {
                    errorMsg += 'Permission denied. Please allow camera access.';
                } else {
                    errorMsg += error.message;
                }
                alert(errorMsg);
                connectionStatus.textContent = '❌ ' + errorMsg;
                connectionStatus.className = 'status error';
            }
        }

        // Start processing frames
        function startProcessingFrame() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            function processFrame() {
                if (!localVideo.videoWidth || !localVideo.videoHeight) {
                    animationFrameId = requestAnimationFrame(processFrame);
                    return;
                }
                
                // Apply transformations and effects
                applyEffects();
                
                animationFrameId = requestAnimationFrame(processFrame);
            }
            
            processFrame();
        }

        // Apply all effects to canvas
        function applyEffects() {
            if (!localVideo.videoWidth || !localVideo.videoHeight) return;
            
            const video = localVideo;
            const canvas = outputCanvas;
            
            // Set canvas dimensions
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Save context state
            ctx.save();
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Apply transformations
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            ctx.translate(centerX, centerY);
            ctx.rotate(effects.rotation * Math.PI / 180);
            
            if (effects.mirror) {
                ctx.scale(-1, 1);
            }
            
            ctx.translate(-centerX, -centerY);
            
            // Draw video frame
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Restore transformation for filters
            ctx.restore();
            
            // Apply image filters
            if (effects.grayscale || effects.sepia || effects.invert || 
                effects.blur > 0 || effects.brightness !== 100 || effects.contrast !== 100) {
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                // Apply brightness and contrast
                if (effects.brightness !== 100 || effects.contrast !== 100) {
                    const brightness = effects.brightness / 100;
                    const contrast = effects.contrast / 100;
                    const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                    
                    for (let i = 0; i < data.length; i += 4) {
                        // Brightness
                        let r = data[i] * brightness;
                        let g = data[i+1] * brightness;
                        let b = data[i+2] * brightness;
                        
                        // Contrast
                        r = factor * (r - 128) + 128;
                        g = factor * (g - 128) + 128;
                        b = factor * (b - 128) + 128;
                        
                        data[i] = Math.min(255, Math.max(0, r));
                        data[i+1] = Math.min(255, Math.max(0, g));
                        data[i+2] = Math.min(255, Math.max(0, b));
                    }
                }
                
                // Apply grayscale
                if (effects.grayscale) {
                    for (let i = 0; i < data.length; i += 4) {
                        const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                        data[i] = gray;
                        data[i+1] = gray;
                        data[i+2] = gray;
                    }
                }
                
                // Apply sepia
                if (effects.sepia) {
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i+1];
                        const b = data[i+2];
                        data[i] = Math.min(255, r * 0.393 + g * 0.769 + b * 0.189);
                        data[i+1] = Math.min(255, r * 0.349 + g * 0.686 + b * 0.168);
                        data[i+2] = Math.min(255, r * 0.272 + g * 0.534 + b * 0.131);
                    }
                }
                
                // Apply invert
                if (effects.invert) {
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = 255 - data[i];
                        data[i+1] = 255 - data[i+1];
                        data[i+2] = 255 - data[i+2];
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
            }
            
            // Apply blur separately (CSS filter is more efficient)
            if (effects.blur > 0) {
                ctx.filter = `blur(${effects.blur}px)`;
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(canvas, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.filter = `blur(${effects.blur}px)`;
                ctx.drawImage(tempCanvas, 0, 0);
                ctx.filter = 'none';
            }
        }

        // Create WebRTC stream with processed canvas
        async function createStream() {
            if (!localStream) {
                alert('Please start the camera first');
                return;
            }

            try {
                // Capture canvas stream
                const canvasStream = outputCanvas.captureStream(30);
                
                peerConnection = new RTCPeerConnection(configuration);
                
                // Add canvas stream tracks
                canvasStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, canvasStream);
                });
                
                // Create offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // Generate room ID
                const roomId = generateRoomId();
                
                // Store stream info
                const streamData = {
                    sdp: offer.sdp,
                    type: offer.type,
                    roomId: roomId,
                    timestamp: Date.now()
                };
                localStorage.setItem(`stream_${roomId}`, JSON.stringify(streamData));
                
                // Create viewer URL
                const viewerUrlFull = `${window.location.protocol}//${window.location.host}${window.location.pathname.replace('streamer.html', 'viewer.html')}?room=${roomId}`;
                viewerUrl.value = viewerUrlFull;
                streamInfo.style.display = 'block';
                
                createStreamBtn.disabled = true;
                stopStreamBtn.disabled = false;
                
                // Clean up old streams
                cleanupOldStreams();
                
                connectionStatus.textContent = '📡 Stream created! Share the URL with viewers.';
                connectionStatus.className = 'status success';
                
                // Set up answer handling
                window.currentRoomId = roomId;
                window.pollForAnswer = setInterval(async () => {
                    const answer = localStorage.getItem(`answer_${roomId}`);
                    if (answer && peerConnection && peerConnection.remoteDescription === null) {
                        try {
                            const answerData = JSON.parse(answer);
                            await peerConnection.setRemoteDescription(answerData);
                            localStorage.removeItem(`answer_${roomId}`);
                            connectionStatus.textContent = '🔗 Viewer connected! Streaming live.';
                            connectionStatus.className = 'status success';
                            clearInterval(window.pollForAnswer);
                        } catch (e) {
                            console.error('Error setting answer:', e);
                        }
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Error creating stream:', error);
                alert('Failed to create stream: ' + error.message);
            }
        }

        function generateRoomId() {
            return Math.random().toString(36).substring(2, 10);
        }

        function cleanupOldStreams() {
            const now = Date.now();
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('stream_')) {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (now - data.timestamp > 3600000) { // 1 hour
                        localStorage.removeItem(key);
                    }
                }
            }
        }

        function stopStream() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            if (window.pollForAnswer) {
                clearInterval(window.pollForAnswer);
            }
            
            if (window.currentRoomId) {
                localStorage.removeItem(`stream_${window.currentRoomId}`);
            }
            
            streamInfo.style.display = 'none';
            createStreamBtn.disabled = false;
            stopStreamBtn.disabled = true;
            
            connectionStatus.textContent = '⏹️ Stream stopped.';
            connectionStatus.className = 'status info';
        }

        // Effect handlers
        function toggleEffect(effectName, button) {
            effects[effectName] = !effects[effectName];
            if (button) {
                button.classList.toggle('active', effects[effectName]);
            }
            updateSliders();
        }

        function updateSliders() {
            brightnessSlider.style.display = effects.brightness !== undefined ? 'block' : 'none';
            contrastSlider.style.display = effects.contrast !== undefined ? 'block' : 'none';
            blurSlider.style.display = effects.blur !== undefined ? 'block' : 'none';
        }

        function resetEffects() {
            effects = {
                mirror: false,
                rotation: 0,
                grayscale: false,
                sepia: false,
                invert: false,
                blur: 0,
                brightness: 100,
                contrast: 100
            };
            
            // Reset buttons
            [mirrorBtn, grayscaleBtn, sepiaBtn, invertBtn, blurBtn, brightnessBtn, contrastBtn].forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Reset sliders
            brightnessRange.value = 100;
            contrastRange.value = 100;
            blurRange.value = 0;
            brightnessValue.textContent = '100';
            contrastValue.textContent = '100';
            blurValue.textContent = '0';
            
            updateSliders();
        }

        // Event listeners
        startCameraBtn.addEventListener('click', startCamera);
        createStreamBtn.addEventListener('click', createStream);
        stopStreamBtn.addEventListener('click', stopStream);
        
        mirrorBtn.addEventListener('click', () => toggleEffect('mirror', mirrorBtn));
        grayscaleBtn.addEventListener('click', () => toggleEffect('grayscale', grayscaleBtn));
        sepiaBtn.addEventListener('click', () => toggleEffect('sepia', sepiaBtn));
        invertBtn.addEventListener('click', () => toggleEffect('invert', invertBtn));
        
        rotateLeftBtn.addEventListener('click', () => {
            effects.rotation = (effects.rotation - 90) % 360;
        });
        
        rotateRightBtn.addEventListener('click', () => {
            effects.rotation = (effects.rotation + 90) % 360;
        });
        
        resetTransformBtn.addEventListener('click', () => {
            effects.mirror = false;
            effects.rotation = 0;
            mirrorBtn.classList.remove('active');
        });
        
        resetEffectsBtn.addEventListener('click', resetEffects);
        
        brightnessRange.addEventListener('input', (e) => {
            effects.brightness = parseInt(e.target.value);
            brightnessValue.textContent = effects.brightness;
        });
        
        contrastRange.addEventListener('input', (e) => {
            effects.contrast = parseInt(e.target.value);
            contrastValue.textContent = effects.contrast;
        });
        
        blurRange.addEventListener('input', (e) => {
            effects.blur = parseInt(e.target.value);
            blurValue.textContent = effects.blur;
        });
        
        brightnessBtn.addEventListener('click', () => {
            brightnessSlider.style.display = brightnessSlider.style.display === 'none' ? 'block' : 'none';
        });
        
        contrastBtn.addEventListener('click', () => {
            contrastSlider.style.display = contrastSlider.style.display === 'none' ? 'block' : 'none';
        });
        
        blurBtn.addEventListener('click', () => {
            blurSlider.style.display = blurSlider.style.display === 'none' ? 'block' : 'none';
        });
        
        copyUrlBtn.addEventListener('click', () => {
            viewerUrl.select();
            document.execCommand('copy');
            copyUrlBtn.textContent = '✓ Copied!';
            setTimeout(() => {
                copyUrlBtn.textContent = '📋 Copy URL';
            }, 2000);
        });
    </script>
</body>
</html>
