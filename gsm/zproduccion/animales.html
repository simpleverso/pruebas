        /* ===== Animales – tema oscuro gris/azul (alineado con translator.html) ===== */
        :root {
            --tx-bg-1:        #0b1322;
            --tx-bg-2:        #111c2f;
            --tx-surface:     #1a2436;
            --tx-surface-2:   #131c2c;
            --tx-surface-3:   #243047;
            --tx-border:      #2a3447;
            --tx-border-2:    #354260;
            --tx-text:        #e6ecf5;
            --tx-text-strong: #f3f6fb;
            --tx-muted:       #94a3b8;
            --tx-label:       #b6c2d4;
            --tx-primary:     #4f8fcf;
            --tx-primary-2:   #6ba6e0;
            --tx-accent:      #3b82f6;
            --tx-shadow:      0 10px 28px rgba(0, 0, 0, 0.45);
        }

        body {
            background:
                radial-gradient(1200px 600px at 80% -20%, rgba(59, 130, 246, 0.10), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(79, 143, 207, 0.10), transparent 60%),
                linear-gradient(180deg, var(--tx-bg-1) 0%, var(--tx-bg-2) 100%);
            background-attachment: fixed;
            color: var(--tx-text);
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        }

        /* Navbar */
        .clean-navbar.bg-white {
            background: rgba(15, 23, 38, 0.85) !important;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--tx-border);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .clean-navbar .nav-link {
            color: var(--tx-label) !important;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .clean-navbar .nav-link.active,
        .clean-navbar .nav-link:hover { color: var(--tx-primary-2) !important; }
        .navbar-brand.logo { color: var(--tx-text-strong) !important; font-weight: 600; }
        .navbar-toggler { border-color: var(--tx-border) !important; }
        .navbar-toggler-icon { filter: invert(1) brightness(1.4) opacity(0.7); }

        /* Layout */
        .gallery-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 110px 24px 60px;
        }
        .gallery-heading {
            text-align: center;
            margin-bottom: 24px;
        }
        .gallery-heading h1 {
            color: var(--tx-text-strong);
            font-weight: 600;
            letter-spacing: -0.01em;
            font-size: 2rem;
            margin: 0 0 8px;
        }
        .gallery-heading p {
            color: var(--tx-muted);
            font-size: 0.95rem;
            margin: 0 auto;
            max-width: 720px;
        }

        /* Navegación de categorías (chips) */
        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 20px 0 36px;
            padding: 12px;
            background: var(--tx-surface);
            border: 1px solid var(--tx-border);
            border-radius: 12px;
            box-shadow: var(--tx-shadow);
        }
        .category-nav a {
            display: inline-block;
            padding: 6px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--tx-label);
            background: var(--tx-surface-2);
            border: 1px solid var(--tx-border-2);
            border-radius: 999px;
            text-decoration: none;
            transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
        }
        .category-nav a:hover {
            background: var(--tx-primary);
            border-color: var(--tx-primary);
            color: #ffffff;
            text-decoration: none;
        }
        .category-nav a .count {
            margin-left: 6px;
            color: var(--tx-muted);
            font-size: 0.72rem;
        }
        .category-nav a:hover .count { color: rgba(255,255,255,0.75); }

        /* Sección por categoría */
        .category-section { scroll-margin-top: 96px; margin-bottom: 44px; }
        .category-title {
            color: var(--tx-text-strong);
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin: 0 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--tx-border);
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .category-title .count {
            color: var(--tx-muted);
            font-size: 0.85rem;
            font-weight: 400;
        }

        /* Grid responsivo */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }

        .animal-card {
            background: var(--tx-surface);
            border: 1px solid var(--tx-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--tx-shadow);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
            display: flex;
            flex-direction: column;
        }
        .animal-card:hover {
            transform: translateY(-3px);
            border-color: var(--tx-border-2);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.55);
        }

        .animal-photo {
            display: block;
            position: relative;
            aspect-ratio: 4 / 3;
            background: var(--tx-surface-2);
            overflow: hidden;
        }
        .animal-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }
        .animal-card:hover .animal-photo img { transform: scale(1.05); }

        /* Placeholder cuando no hay imagen */
        .animal-photo.is-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 50% 50%, rgba(79, 143, 207, 0.10), transparent 60%),
                var(--tx-surface-2);
        }
        .animal-photo.is-placeholder .ph-icon {
            color: var(--tx-border-2);
            font-size: 38px;
            transition: color 0.2s ease, transform 0.4s ease;
        }
        .animal-card:hover .animal-photo.is-placeholder .ph-icon {
            color: var(--tx-primary);
            transform: scale(1.08);
        }
        .animal-photo.is-placeholder::after {
            content: "Sin imagen";
            position: absolute;
            bottom: 8px;
            right: 10px;
            font-size: 0.66rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--tx-muted);
            opacity: 0.6;
        }

        .animal-body {
            padding: 12px 14px 14px;
            border-top: 1px solid var(--tx-border);
        }
        .animal-name-zap {
            color: var(--tx-text-strong);
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 2px;
            letter-spacing: 0.005em;
            word-break: break-word;
        }
        .animal-name-es {
            color: var(--tx-muted);
            font-size: 0.82rem;
            font-weight: 400;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .animal-name-es::before {
            content: "";
            display: inline-block;
            width: 16px;
            height: 1px;
            background: var(--tx-border-2);
            flex-shrink: 0;
        }
        .animal-name-es.is-empty {
            color: var(--tx-muted);
            opacity: 0.55;
            font-style: italic;
        }

        /* Atribución de fuente */
        .source-note {
            margin-top: 32px;
            padding: 14px 18px;
            background: var(--tx-surface);
            border: 1px solid var(--tx-border);
            border-left: 3px solid var(--tx-primary-2);
            border-radius: 8px;
            color: var(--tx-muted);
            font-size: 0.82rem;
            line-height: 1.55;
        }
        .source-note strong { color: var(--tx-label); font-weight: 600; }

        /* Footer */
        .footer-basic {
            background: transparent;
            border-top: 1px solid var(--tx-border);
            margin-top: 40px;
            padding: 18px 0;
        }
        .footer-basic .copyright {
            color: var(--tx-muted);
            font-size: 0.82rem;
            margin: 0;
            text-align: center;
        }

        ::selection {
            background: rgba(59, 130, 246, 0.45);
            color: var(--tx-text-strong);
        }

        @media (max-width: 575.98px) {
            .gallery-shell { padding: 100px 16px 40px; }
            .gallery-heading h1 { font-size: 1.55rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .animal-body { padding: 10px 12px 12px; }
            .category-title { font-size: 1.15rem; }
        }
    </style>
</head>

        const IMG_BASE = "https://simpleverso.github.io/DidxazappWEB/assets/img/animales/";

        // ---------- Render ----------
        const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

        function renderCard(a) {
            const photo = a.img
                ? `<a class="animal-photo" href="${IMG_BASE}${a.img}" data-caption="${escapeHtml(a.zap)} — ${escapeHtml(a.es || '')}">
                       <img src="${IMG_BASE}${a.img}" alt="${escapeHtml(a.es || a.zap)}" loading="lazy">
                   </a>`
                : `<div class="animal-photo is-placeholder" aria-hidden="true">
                       <i class="fa fa-paw ph-icon" aria-hidden="true"></i>
                   </div>`;

            const esLine = a.es
                ? `<p class="animal-name-es">${escapeHtml(a.es)}</p>`
                : `<p class="animal-name-es is-empty">Definición no disponible</p>`;

            return `<article class="animal-card">
                ${photo}
                <div class="animal-body">
                    <h3 class="animal-name-zap">${escapeHtml(a.zap)}</h3>
                    ${esLine}
                </div>
            </article>`;
        }

        function renderSection(group) {
            return `<section class="category-section" id="${group.id}">
                <h2 class="category-title">${escapeHtml(group.title)} <span class="count">${group.items.length}</span></h2>
                <div class="gallery-grid" data-group="${group.id}">
                    ${group.items.map(renderCard).join('')}
                </div>
            </section>`;
        }

        function renderNav() {
            return ANIMAL_GROUPS.map(g =>
                `<a href="#${g.id}">${escapeHtml(g.title)}<span class="count">${g.items.length}</span></a>`
            ).join('');
        }

        document.getElementById('category-nav').innerHTML = renderNav();
        document.getElementById('content-root').innerHTML = ANIMAL_GROUPS.map(renderSection).join('');

        // Lightbox sólo aplica a las fotos reales (los placeholders no son <a>).
        ANIMAL_GROUPS.forEach(g => {
            baguetteBox.run(`.gallery-grid[data-group="${g.id}"]`, { animation: 'fadeIn', captions: true });
        });

        // Año automático
        document.getElementById('anio').textContent = new Date().getFullYear();
    </script>
