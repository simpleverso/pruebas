<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Animales · Didxazapp</title>
    <meta name="description" content="Galería de animales con sus nombres en Zapoteco del Istmo y español.">
    <link rel="icon" type="image/png" sizes="512x512" href="https://simpleverso.github.io/DidxazappWEB/assets/img/Dictionary-icon.png">
    <link rel="stylesheet" href="https://simpleverso.github.io/DidxazappWEB/assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:400,500,600,700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.10.0/baguetteBox.min.css">
    <style>
        /* ===== Animales – tema oscuro gris/azul (alineado con translator.html) ===== */
        :root {
            --tx-bg-1:        #0b1322;
            --tx-bg-2:        #111c2f;
            --tx-surface:     #1a2436;
            --tx-surface-2:   #131c2c;
            --tx-surface-3:   #243047;
            --tx-border:      #2a3447;
            --tx-border-2:    #354260;
            --tx-text:        #e6ecf5;
            --tx-text-strong: #f3f6fb;
            --tx-muted:       #94a3b8;
            --tx-label:       #b6c2d4;
            --tx-primary:     #4f8fcf;
            --tx-primary-2:   #6ba6e0;
            --tx-accent:      #3b82f6;
            --tx-shadow:      0 10px 28px rgba(0, 0, 0, 0.45);
        }

        body {
            background:
                radial-gradient(1200px 600px at 80% -20%, rgba(59, 130, 246, 0.10), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(79, 143, 207, 0.10), transparent 60%),
                linear-gradient(180deg, var(--tx-bg-1) 0%, var(--tx-bg-2) 100%);
            background-attachment: fixed;
            color: var(--tx-text);
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        }

        /* Navbar */
        .clean-navbar.bg-white {
            background: rgba(15, 23, 38, 0.85) !important;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--tx-border);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .clean-navbar .nav-link {
            color: var(--tx-label) !important;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .clean-navbar .nav-link.active,
        .clean-navbar .nav-link:hover { color: var(--tx-primary-2) !important; }
        .navbar-brand.logo { color: var(--tx-text-strong) !important; font-weight: 600; }
        .navbar-toggler { border-color: var(--tx-border) !important; }
        .navbar-toggler-icon { filter: invert(1) brightness(1.4) opacity(0.7); }

        /* Encabezado */
        .gallery-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 110px 24px 60px;
        }
        .gallery-heading {
            text-align: center;
            margin-bottom: 32px;
        }
        .gallery-heading h1 {
            color: var(--tx-text-strong);
            font-weight: 600;
            letter-spacing: -0.01em;
            font-size: 2rem;
            margin: 0 0 8px;
        }
        .gallery-heading p {
            color: var(--tx-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        /* Grid responsivo de tarjetas */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 22px;
        }

        .animal-card {
            background: var(--tx-surface);
            border: 1px solid var(--tx-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--tx-shadow);
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
            display: flex;
            flex-direction: column;
        }
        .animal-card:hover {
            transform: translateY(-3px);
            border-color: var(--tx-border-2);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.55);
        }

        .animal-photo {
            display: block;
            position: relative;
            aspect-ratio: 4 / 3;
            background: var(--tx-surface-2);
            overflow: hidden;
        }
        .animal-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }
        .animal-card:hover .animal-photo img { transform: scale(1.05); }

        .animal-body {
            padding: 14px 16px 16px;
            border-top: 1px solid var(--tx-border);
        }
        .animal-name-zap {
            color: var(--tx-text-strong);
            font-size: 1.05rem;
            font-weight: 600;
            margin: 0 0 2px;
            letter-spacing: 0.005em;
        }
        .animal-name-es {
            color: var(--tx-muted);
            font-size: 0.85rem;
            font-weight: 400;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .animal-name-es::before {
            content: "";
            display: inline-block;
            width: 18px;
            height: 1px;
            background: var(--tx-border-2);
        }

        /* Footer */
        .footer-basic {
            background: transparent;
            border-top: 1px solid var(--tx-border);
            margin-top: 40px;
            padding: 18px 0;
        }
        .footer-basic .copyright {
            color: var(--tx-muted);
            font-size: 0.82rem;
            margin: 0;
            text-align: center;
        }

        /* Selección y scroll */
        ::selection {
            background: rgba(59, 130, 246, 0.45);
            color: var(--tx-text-strong);
        }

        @media (max-width: 575.98px) {
            .gallery-shell { padding: 100px 16px 40px; }
            .gallery-heading h1 { font-size: 1.55rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .animal-body { padding: 12px 14px; }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-light navbar-expand-lg fixed-top bg-white clean-navbar">
        <div class="container">
            <a class="navbar-brand logo" href="index.html">
                <img class="rounded img-fluid" src="https://simpleverso.github.io/DidxazappWEB/assets/img/Dictionary-icon.png" width="55" height="55">&nbsp;SimplesoftMX&nbsp;
            </a>
            <button data-toggle="collapse" class="navbar-toggler" data-target="#navcol-1">
                <span class="sr-only">Toggle navigation</span>
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navcol-1">
                <ul class="nav navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">INICIO</a></li>
                    <li class="nav-item"><a class="nav-link" href="translator.html">TRADUCTOR</a></li>
                    <li class="nav-item"><a class="nav-link" href="numeros.html">Numeros</a></li>
                    <li class="nav-item"><a class="nav-link active" href="animales.html">Animales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="gallery-shell">
        <header class="gallery-heading">
            <h1>Animales en Zapoteco</h1>
            <p>Galería de animales con su nombre en Zapoteco del Istmo y en español.</p>
        </header>

        <section class="gallery-grid" id="animal-gallery">
            <!-- Las tarjetas se generan dinámicamente desde el array `ANIMALES` para evitar HTML repetitivo. -->
        </section>
    </main>

    <div class="footer-basic">
        <footer>
            <p class="copyright">SimplesoftMX &amp; Didxaza Traducciones México · <span id="anio"></span></p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.3.1/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.10.0/baguetteBox.min.js"></script>

    <script>
        // Lista de animales (zapoteco + español + ruta de imagen).
        // Las imágenes están alojadas en simpleverso.github.io para no duplicar binarios.
        const ANIMALES = [
            { zap: "Biizu",        es: "Abeja",        img: "abeja.jpg" },
            { zap: "Meuxubi",      es: "Alacrán",      img: "alacran.png" },
            { zap: "Bidxiguí",     es: "Araña",        img: "ara%C3%B1a.jpg" },
            { zap: "Chisa",        es: "Ardilla",      img: "ardilla.png" },
            { zap: "Ngupi",        es: "Armadillo",    img: "armadillo.jpg" },
            { zap: "Guluuxu",      es: "Bagre",        img: "bagre.jpg" },
            { zap: "Dendxu'",      es: "Borrego",      img: "borrego.jpg" },
            { zap: "Mani'",        es: "Caballo",      img: "caballo.jpg" },
            { zap: "Bendabuaa",    es: "Camarón",      img: "camaron.jpg" },
            { zap: "Bihui",        es: "Cerdo",        img: "cerdo.jpg" },
            { zap: "Biulú",        es: "Colibrí",      img: "colibri.jpg" },
            { zap: "Leexhu",       es: "Conejo",       img: "conejo.jpg" },
            { zap: "Mistu'",       es: "Gato",         img: "gato.jpg" },
            { zap: "Tou'",         es: "Guajolote",    img: "guajolote.jpg" },
            { zap: "Biri'",        es: "Hormiga",      img: "hormiga.jpg" },
            { zap: "Guchachi'",    es: "Iguana",       img: "iguana.jpg" },
            { zap: "Beedxe'",      es: "León / Tigre", img: "leon.png" },
            { zap: "Xhumpirinisa", es: "Libélula",     img: "libelula.jpg" },
            { zap: "Guugu'",       es: "Paloma",       img: "paloma.jpg" },
            { zap: "Bi'cu",        es: "Perro",        img: "perro.jpg" },
            { zap: "Biizi",        es: "Tlacuache",    img: "tlacuache.jpg" },
            { zap: "Bigu",         es: "Tortuga",      img: "tortuga.jpeg" },
            { zap: "Bidxiña",      es: "Venado",       img: "venado.jpg" },
        ];
        const IMG_BASE = "https://simpleverso.github.io/DidxazappWEB/assets/img/animales/";

        // Render
        const $gallery = document.getElementById('animal-gallery');
        const escapeHtml = s => s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
        $gallery.innerHTML = ANIMALES.map(a => `
            <article class="animal-card">
                <a class="animal-photo" href="${IMG_BASE}${a.img}" data-caption="${escapeHtml(a.zap)} — ${escapeHtml(a.es)}">
                    <img src="${IMG_BASE}${a.img}" alt="${escapeHtml(a.es)} (${escapeHtml(a.zap)} en zapoteco)" loading="lazy">
                </a>
                <div class="animal-body">
                    <h3 class="animal-name-zap">${escapeHtml(a.zap)}</h3>
                    <p class="animal-name-es">${escapeHtml(a.es)}</p>
                </div>
            </article>
        `).join('');

        // Lightbox: clic en la foto la abre a tamaño completo.
        baguetteBox.run('#animal-gallery', { animation: 'fadeIn', captions: true });

        // Año automático en el footer
        document.getElementById('anio').textContent = new Date().getFullYear();
    </script>
    <script src="assets/js/page-config.js" data-page="animales"></script>
</body>

</html>
