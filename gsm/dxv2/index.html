<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapotec Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .gradient-text {
            background: -webkit-linear-gradient(#4F46E5, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl bg-gray-800 rounded-2xl shadow-2xl p-6 md:p-8 space-y-6">
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-3xl md:text-4xl font-bold gradient-text">Zapotec Translator</h1>
            <p class="text-gray-400 mt-2">Translate from Spanish to Isthmus Zapotec</p>
        </div>

        <!-- Translator Interface -->
        <div class="space-y-4">
            <!-- Spanish Input -->
            <div>
                <div class="flex items-baseline justify-between mb-2">
                    <label for="spanish-input" class="block text-sm font-medium text-gray-300">Spanish</label>
                    <span id="char-counter" class="text-xs text-gray-500">0 / 26</span>
                </div>
                <textarea id="spanish-input" rows="5" maxlength="26" class="w-full bg-gray-700 border-gray-600 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-200" placeholder="Up to 26 characters..."></textarea>
            </div>

            <!-- Translate Button -->
            <div class="flex justify-center">
                <button id="translate-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md hover:shadow-lg transform hover:scale-105 transition-all duration-300 ease-in-out">
                    Translate
                </button>
            </div>

            <!-- Zapotec Output -->
            <div>
                <label for="zapotec-output" class="block text-sm font-medium text-gray-300 mb-2">Zapotec (Didxazá)</label>
                <!-- Changed textarea to a div to support rich text (italics) -->
                <div id="zapotec-output" class="w-full min-h-[120px] bg-gray-700 border border-gray-600 rounded-lg p-3 text-gray-300" aria-readonly="true">
                    <span class="text-gray-500">Translation will appear here...</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center text-xs text-gray-500 pt-4">
            <p>Powered by client-side WebAssembly. No server required.</p>
        </div>
    </div>

    <!--
      Translation logic is compiled to translator.wasm. The dictionary and
      grammatical rules are embedded inside the wasm module as an encrypted
      blob; the editable sources live in scripts/database.js and
      scripts/rules.js but those files are no longer loaded by the page.
      Run `npm run build` (or ./scripts/build.sh / scripts\build.bat) after editing them
      to regenerate translator.wasm.
    -->
    <script src="loader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const translateBtn = document.getElementById('translate-btn');
            const spanishInput = document.getElementById('spanish-input');
            const zapotecOutput = document.getElementById('zapotec-output');
            const charCounter = document.getElementById('char-counter');

            const PLACEHOLDER = '<span class="text-gray-500">Translation will appear here...</span>';
            const MAX_LEN = 26;

            function updateCounter() {
                const n = spanishInput.value.length;
                charCounter.textContent = n + ' / ' + MAX_LEN;
                charCounter.className = (n >= MAX_LEN)
                    ? 'text-xs text-amber-400'
                    : 'text-xs text-gray-500';
            }
            spanishInput.addEventListener('input', updateCounter);
            updateCounter();

            // Warm up the wasm in the background so the first click is snappy.
            TRANSLATOR.init().catch(err => {
                console.error('translator init failed', err);
                zapotecOutput.innerHTML = '<span class="text-red-400">Failed to load translator.</span>';
            });

            translateBtn.addEventListener('click', async () => {
                const text = spanishInput.value;
                if (!text.trim()) {
                    zapotecOutput.innerHTML = PLACEHOLDER;
                    return;
                }
                if (text.length > MAX_LEN) {
                    zapotecOutput.innerHTML = '<span class="text-amber-400">Limit: ' + MAX_LEN + ' characters (got ' + text.length + ').</span>';
                    return;
                }
                try {
                    const out = await TRANSLATOR.translate(text);
                    zapotecOutput.innerHTML = out || PLACEHOLDER;
                } catch (err) {
                    console.error(err);
                    zapotecOutput.innerHTML = '<span class="text-red-400">Translation error.</span>';
                }
            });
        });
    </script>
</body>
</html>
